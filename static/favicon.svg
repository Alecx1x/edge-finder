<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0b0e13"/>
    </linearGradient>
  </defs>

  <!-- dark rounded tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#2b333d" stroke-width="1.5"/>

  <!-- diamond = the "edge" / Money Lab mark -->
  <path d="M32 9 L55 32 L32 55 L9 32 Z"
        fill="none" stroke="url(#edge)" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- rising trend line inside the diamond (markets going up) -->
  <polyline points="19,38 28,32 34,36 45,23"
            fill="none" stroke="url(#edge)" stroke-width="3.2"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- spark at the peak -->
  <circle cx="45" cy="23" r="3.4" fill="#fbbf24"/>
</svg>
